<h4 id="下面看代码（解释见注释）"><a href="#下面看代码（解释见注释）" class="headerlink" title="下面看代码（解释见注释）"></a>下面看代码（解释见注释）</h4><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> torch</span><br><span class="line"><span class="keyword">import</span> numpy <span class="keyword">as</span> np</span><br><span class="line"></span><br><span class="line">a = np.array([[[<span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span>],</span><br><span class="line">               [<span class="number">4</span>,<span class="number">5</span>,<span class="number">6</span>]]])</span><br><span class="line">print(<span class="string">"numpy 的 reshape"</span>)</span><br><span class="line">print(a.reshape(<span class="number">-1</span>,<span class="number">6</span>))</span><br><span class="line">print(<span class="string">"============="</span>)</span><br><span class="line">print(<span class="string">"pytorch"</span>)</span><br><span class="line">x = torch.tensor(a)</span><br><span class="line">print(x.size())</span><br><span class="line">print(x)</span><br><span class="line">x = x.view(<span class="number">-1</span>,<span class="number">6</span>)</span><br><span class="line">print(x.size())</span><br><span class="line">print(x)</span><br><span class="line">print(<span class="string">"-------------"</span>)</span><br><span class="line">b = np.array([<span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span>])</span><br><span class="line">y = torch.tensor(b)</span><br><span class="line">print(y.size())</span><br><span class="line">print(y)</span><br><span class="line">y = y.view(<span class="number">-1</span>,<span class="number">3</span>)</span><br><span class="line">print(y.size())</span><br><span class="line">print(y)</span><br></pre></td></tr></table></figure>

<h6 id="输出："><a href="#输出：" class="headerlink" title="输出："></a>输出：</h6><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">numpy 的 reshape</span><br><span class="line">[[1 2 3 4 5 6]]</span><br><span class="line">=============</span><br><span class="line">pytorch</span><br><span class="line">torch.Size([1, 2, 3])</span><br><span class="line">tensor([[[1, 2, 3],</span><br><span class="line">         [4, 5, 6]]], dtype=torch.int32)</span><br><span class="line">torch.Size([1, 6])</span><br><span class="line">tensor([[1, 2, 3, 4, 5, 6]], dtype=torch.int32)</span><br><span class="line">-------------</span><br><span class="line">torch.Size([3])</span><br><span class="line">tensor([1, 2, 3], dtype=torch.int32)</span><br><span class="line">torch.Size([1, 3])</span><br><span class="line">tensor([[1, 2, 3]], dtype=torch.int32)</span><br></pre></td></tr></table></figure>

<p>从上面可以看出，此处的view()的作用和numpy的reshape的作用类似，就是转换维度，最后得到自己需要的维度的张量，其中<strong>-1</strong>则是具有推导合适的值得作用，和numpy里面一样。</p>
