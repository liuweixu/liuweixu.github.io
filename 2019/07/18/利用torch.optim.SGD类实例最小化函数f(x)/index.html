-144x144.png"><link rel="alternate" type="application/atom+xml" title="Atom 0.3" href="atom.xml"></head><body itemscope itemtype="https://schema.org/WebPage"><header itemscope itemtype="https://schema.org/WPHeader"><a href="/"><img src="/images/svdb.png" alt="PJCK" title="PJCK"></a><h1><a href="/" alt="PJCK" title="PJCK" itemprop="headline">PJCK</a></h1><p itemprop="description">This is a personal blog about IT.</p><nav itemscope itemtype="https://schema.org/SiteNavigationElement"><ul><li itemprop="name"><a href="/" alt="Home" title="Home" itemprop="url">Home</a></li><li itemprop="name"><a href="/articles" alt="Articles" title="Articles" itemprop="url">Articles</a></li><li itemprop="name"><a href="/about" alt="About" title="About" itemprop="url">About</a></li></ul></nav><div class="space"></div></header><main itemscope itemtype="https://schema.org/Blog"><article class="full"><h1 itemprop="headline">利用torch.optim.SGD类实例最小化函数f(x)</h1><span class="post-meta">Published on<time itemprop="datePublished" datetime="2019-07-18T05:40:55.000Z"> 星期四, 七月 18日 2019 at 5:40</time><br>Last updated on<time itemprop="dateModified" datetime="2019-07-18T05:40:55.000Z"> 星期四, 七月 18日 2019 at 5:59</time></span><h3 id="如题"><a href="#如题" class="headerlink" title="如题"></a>如题</h3><a id="more"></a>

<h5 id="–来自于肖志清的《神经网络与pytorch实战》"><a href="#–来自于肖志清的《神经网络与pytorch实战》" class="headerlink" title="–来自于肖志清的《神经网络与pytorch实战》"></a>–来自于肖志清的《神经网络与pytorch实战》</h5><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">from</span> math <span class="keyword">import</span> pi</span><br><span class="line"><span class="keyword">import</span> torch</span><br><span class="line"></span><br><span class="line">x = torch.tensor([pi/<span class="number">3</span>, pi/<span class="number">6</span>], requires_grad=<span class="literal">True</span>) <span class="comment"># 输入的数</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> torch.optim <span class="keyword">as</span> optim</span><br><span class="line">optimzer = optim.SGD([x,], lr=<span class="number">0.1</span>, momentum=<span class="number">0</span>)<span class="comment"># 第一个参数是需要更新的列表。</span></span><br><span class="line"><span class="keyword">for</span> step <span class="keyword">in</span> range(<span class="number">11</span>):</span><br><span class="line">    <span class="comment"># step为0时，没有优化，从1开始优化。</span></span><br><span class="line">    <span class="keyword">if</span> step:</span><br><span class="line">        optimzer.zero_grad() <span class="comment"># 需要清空优化器在上次迭代中存储的数据。避免积累。</span></span><br><span class="line">        f.backward()	<span class="comment"># 调用这个方法，说明进行求导。</span></span><br><span class="line">        optimzer.step()	<span class="comment"># 用这个方法更新自变量的值</span></span><br><span class="line">    f = -((x.cos() ** <span class="number">2</span>).sum()) ** <span class="number">2</span></span><br><span class="line">    print(<span class="string">'step &#123;&#125; : x = &#123;&#125;, f(x) = &#123;&#125;'</span>.format(step, x.tolist(), f))</span><br></pre></td></tr></table></figure>
